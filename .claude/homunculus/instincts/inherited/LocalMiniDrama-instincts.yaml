# LocalMiniDrama Workflow Synchronize Timeout Settings Backend And Frontend

## Action

Follow the synchronize-timeout-settings-backend-and-frontend workflow:
1. Update backend configuration files related to timeout (e.g., backend-node/configs/config.yaml, backend-node/src/config/videoGeneration.js).
2. Modify backend service or route files that use timeout (e.g., backend-node/src/services/videoClient.js, backend-node/src/routes/settings.js, backend-node/src/services/videoService.js).
3. Update corresponding frontend view files to match backend timeout logic (e.g., frontweb/src/views/FilmCreate.vue, frontweb/src/views/FreeCreate.vue).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend-node/configs/config.yaml, backend-node/src/config/videoGeneration.js, backend-node/src/routes/settings.js

